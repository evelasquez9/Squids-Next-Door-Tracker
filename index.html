<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Codename: Squids Next Door</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a2236;
    min-height: 100vh;
    font-family: Georgia, serif;
    color: #e0f2fe;
    padding-bottom: 60px;
  }
  /* Wavy water background */
  #water-bg { position: fixed; inset: 0; z-index: -2; overflow: hidden; }
  #water-bg svg {
    position: absolute; top: -4%; left: -4%;
    width: 108%; height: 108%;
  }
  /* Cheap GPU-composited moving light sheen — smooth on mobile */
  #water-bg::before {
    content: ""; position: absolute; inset: -25%;
    background: linear-gradient(118deg,
      transparent 38%,
      rgba(191,230,247,0.07) 48%,
      rgba(191,230,247,0.10) 52%,
      transparent 62%);
    animation: waterSheen 16s ease-in-out infinite alternate;
    will-change: transform;
  }
  #water-bg::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(60,140,180,0.10) 0%,
      rgba(10,35,60,0.18) 45%,
      rgba(3,14,28,0.58) 100%);
  }
  @keyframes waterSheen {
    0%   { transform: translate(-8%, -4%); }
    100% { transform: translate(8%, 4%); }
  }
  .bubble {
    position: fixed; border-radius: 50%;
    border: 1px solid rgba(125,211,252,0.12);
    pointer-events: none; opacity: 0.4;
  }
  header {
    text-align: center;
    padding: 36px 20px 24px;
    background: linear-gradient(180deg, rgba(6,95,141,0.4) 0%, transparent 100%);
    border-bottom: 1px solid rgba(125,211,252,0.15);
    margin-bottom: 28px;
  }
  header .squid-icon { font-size: 48px; margin-bottom: 4px; }
  header .codename-label {
    font-size: 11px; letter-spacing: 6px;
    color: #7dd3fc; text-transform: uppercase; margin-bottom: 4px;
  }
  header h1 {
    font-size: clamp(22px, 5vw, 34px);
    color: #e0f2fe; font-style: italic; letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(125,211,252,0.5);
  }
  header .subtitle { font-size: 11px; color: #38bdf8; letter-spacing: 3px; margin-top: 4px; }
  #summary-bar {
    display: inline-block; margin-top: 18px;
    background: rgba(14,165,233,0.15);
    border: 1px solid rgba(14,165,233,0.35);
    border-radius: 30px; padding: 8px 22px;
    color: #7dd3fc; font-size: 14px;
  }
  main { max-width: 600px; margin: 0 auto; padding: 0 16px; }
  .card {
    border-radius: 16px; padding: 18px 20px;
    margin-bottom: 14px; display: flex;
    align-items: center; gap: 14px;
    transition: all 0.3s ease;
  }
  .card.done {
    background: linear-gradient(135deg, rgba(6,95,70,0.45), rgba(4,120,87,0.25));
    border: 1px solid rgba(52,211,153,0.5);
    box-shadow: 0 0 18px rgba(52,211,153,0.15);
  }
  .card.pending {
    background: linear-gradient(135deg, rgba(14,40,80,0.7), rgba(10,28,60,0.7));
    border: 1px solid rgba(125,211,252,0.15);
  }
  .card-icon { font-size: 28px; flex-shrink: 0; }
  .card-info { flex: 1; min-width: 0; }
  .card-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-name { font-weight: bold; font-size: 16px; color: #e0f2fe; }
  .badge {
    font-size: 11px; padding: 2px 8px;
    border-radius: 20px; font-style: normal;
  }
  .card-goal { color: #7dd3fc; font-size: 13px; margin-top: 2px; opacity: 0.9; }
  .card-streak { font-size: 12px; margin-top: 4px; }
  .card-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
  .btn-ink {
    background: linear-gradient(135deg, #0284c7, #0369a1);
    color: #e0f2fe; border: none; border-radius: 10px;
    padding: 8px 14px; font-size: 13px; cursor: pointer;
    font-family: Georgia, serif; white-space: nowrap;
  }
  .btn-ink:hover { opacity: 0.85; }
  .inked-label { color: #34d399; font-size: 13px; font-weight: bold; }
  .btn-unink {
    background: rgba(125,211,252,0.1); color: #7dd3fc;
    border: 1px solid rgba(125,211,252,0.3); border-radius: 8px;
    font-size: 11px; cursor: pointer; padding: 4px 10px;
    font-family: Georgia, serif;
  }
  .btn-unink:hover { background: rgba(125,211,252,0.2); color: #bae6fd; }
  .btn-remove {
    background: rgba(220,38,38,0.12); color: #fca5a5;
    border: 1px solid rgba(220,38,38,0.35); border-radius: 8px;
    font-size: 11px; cursor: pointer; padding: 4px 10px;
    font-family: Georgia, serif;
  }
  .btn-remove:hover { background: rgba(220,38,38,0.22); color: #fecaca; }
  .btn-edit {
    background: rgba(125,211,252,0.08); color: #7dd3fc;
    border: 1px solid rgba(125,211,252,0.25); border-radius: 8px;
    font-size: 11px; cursor: pointer; padding: 4px 10px;
    font-family: Georgia, serif;
  }
  .btn-edit:hover { background: rgba(125,211,252,0.16); color: #bae6fd; }
  /* Edit modal */
  #edit-modal {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(3,14,28,0.75); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  #edit-modal-box {
    background: rgba(14,40,80,0.97);
    border: 1px solid rgba(125,211,252,0.3);
    border-radius: 18px; padding: 24px; width: 100%; max-width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  #edit-modal-box .form-title { color: #e0f2fe; margin-bottom: 14px; font-size: 15px; }
  #edit-modal-box input {
    width: 100%; background: rgba(10,22,40,0.8);
    border: 1px solid rgba(125,211,252,0.25);
    border-radius: 10px; padding: 10px 14px;
    color: #e0f2fe; font-size: 14px;
    font-family: Georgia, serif; margin-bottom: 10px;
    outline: none;
  }
  #edit-modal-box input::placeholder { color: #475569; }
  .empty-msg { text-align: center; color: #7dd3fc; opacity: 0.6; font-size: 15px; margin: 40px 0; }
  #add-btn {
    display: block; width: 100%;
    background: rgba(14,165,233,0.08);
    border: 1px dashed rgba(125,211,252,0.3);
    border-radius: 16px; color: #7dd3fc;
    font-size: 15px; padding: 16px;
    cursor: pointer; font-family: Georgia, serif; margin-top: 8px;
  }
  #add-btn:hover { background: rgba(14,165,233,0.14); }
  #add-form {
    background: rgba(14,40,80,0.7);
    border: 1px solid rgba(125,211,252,0.25);
    border-radius: 16px; padding: 20px; margin-top: 8px;
  }
  #add-form .form-title { color: #e0f2fe; margin-bottom: 12px; font-size: 15px; }
  #add-form .form-hint { color: #64748b; font-size: 11px; margin: -4px 0 10px; }
  #add-form input {
    width: 100%; background: rgba(10,22,40,0.8);
    border: 1px solid rgba(125,211,252,0.25);
    border-radius: 10px; padding: 10px 14px;
    color: #e0f2fe; font-size: 14px;
    font-family: Georgia, serif; margin-bottom: 10px;
    outline: none;
  }
  #add-form input::placeholder { color: #475569; }
  .goal-type-toggle {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  .goal-type-toggle button {
    flex: 1; padding: 8px; border-radius: 10px; font-size: 13px;
    font-family: Georgia, serif; cursor: pointer; border: 1px solid rgba(125,211,252,0.25);
    background: rgba(10,22,40,0.8); color: #7dd3fc; transition: all 0.2s;
  }
  .goal-type-toggle button.active {
    background: rgba(14,165,233,0.25); border-color: #38bdf8; color: #e0f2fe;
  }
  .form-btns { display: flex; gap: 10px; }
  .btn-join {
    flex: 1; background: linear-gradient(135deg, #0284c7, #0369a1);
    color: #e0f2fe; border: none; border-radius: 10px;
    padding: 10px; font-size: 14px; cursor: pointer; font-family: Georgia, serif;
  }
  .btn-cancel {
    background: transparent; color: #7dd3fc;
    border: 1px solid rgba(125,211,252,0.25);
    border-radius: 10px; padding: 10px 16px;
    font-size: 14px; cursor: pointer; font-family: Georgia, serif;
  }
  .legend { margin-top: 28px; color: #94c5e0; font-size: 12px; text-align: center; }
  /* Squid of Shame banner */
  #shame-banner {
    background: linear-gradient(135deg, rgba(127,29,29,0.55), rgba(153,27,27,0.35));
    border: 1px solid rgba(239,68,68,0.5);
    border-radius: 16px; padding: 16px 20px;
    margin-bottom: 18px; text-align: center;
    box-shadow: 0 0 24px rgba(239,68,68,0.12);
  }
  #shame-banner .shame-title {
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: #fca5a5; margin-bottom: 6px;
  }
  #shame-banner .shame-name {
    font-size: clamp(18px, 4vw, 24px); font-style: italic;
    color: #fecaca; font-weight: bold;
    text-shadow: 0 0 14px rgba(239,68,68,0.4);
  }
  #shame-banner .shame-detail {
    font-size: 12px; color: #f87171; margin-top: 6px; opacity: 0.85;
  }
  .card-missed {
    font-size: 12px; margin-top: 4px;
  }
  #toast {
    position: fixed; top: 16px; right: 16px;
    background: #0e7490; color: #e0f2fe;
    padding: 10px 18px; border-radius: 12px;
    font-size: 14px; z-index: 999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    display: none; font-family: Georgia, serif;
  }
  #setup-banner {
    background: rgba(234,179,8,0.15);
    border: 1px solid rgba(234,179,8,0.4);
    border-radius: 12px; padding: 14px 18px;
    color: #fde68a; font-size: 13px;
    margin-bottom: 20px; line-height: 1.6;
  }
</style>
</head>
<body>

<!-- Wavy water background -->
<div id="water-bg">
  <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="100%" height="100%">
    <defs>
      <filter id="waterTex" x="0" y="0" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.004 0.022" numOctaves="5" seed="7" result="noise"/>
        <feDiffuseLighting in="noise" lighting-color="#bfe6f7" surfaceScale="5.5" result="lit">
          <feDistantLight azimuth="235" elevation="48"/>
        </feDiffuseLighting>
        <feBlend in="lit" in2="SourceGraphic" mode="multiply"/>
      </filter>
    </defs>
    <rect width="100%" height="100%" fill="#2e85ae" filter="url(#waterTex)"/>
  </svg>
</div>

<!-- Bubbles -->
<div class="bubble" style="width:20px;height:20px;left:5%;top:80%"></div>
<div class="bubble" style="width:35px;height:35px;left:15%;top:60%"></div>
<div class="bubble" style="width:14px;height:14px;left:30%;top:90%"></div>
<div class="bubble" style="width:50px;height:50px;left:50%;top:40%"></div>
<div class="bubble" style="width:22px;height:22px;left:65%;top:70%"></div>
<div class="bubble" style="width:40px;height:40px;left:75%;top:20%"></div>
<div class="bubble" style="width:16px;height:16px;left:85%;top:55%"></div>
<div class="bubble" style="width:30px;height:30px;left:92%;top:85%"></div>

<div id="toast"></div>

<header>
  <div class="squid-icon">🦑</div>
  <div class="codename-label">CODENAME:</div>
  <h1>Squids Next Door</h1>
  <div class="subtitle">DAILY MISSION TRACKER</div>
  <div id="summary-bar" style="display:none"></div>
</header>

<main>
  <div id="setup-banner" style="display:none"></div>
  <div id="shame-banner" style="display:none"></div>
  <div id="cards"></div>
  <div id="empty-msg" class="empty-msg" style="display:none">No squids yet — add your crew below! 🌊</div>
  <button id="add-btn">+ Add a Squid to the Squad</button>
  <div id="add-form" style="display:none">
    <div class="form-title">🦑 New Squid</div>
    <input id="inp-name" type="text" placeholder="Your name" />
    <input id="inp-goal" type="text" placeholder="Your goal" />
    <div class="goal-type-toggle">
      <button id="btn-type-daily" class="active">📅 Daily</button>
      <button id="btn-type-weekly">🗓️ Weekly</button>
    </div>
    <div id="weekly-target-row" style="display:none">
      <input id="inp-weekly-target" type="number" min="1" max="7" placeholder="How many times per week? (e.g. 4)" />
    </div>
    <input id="inp-pin" type="tel" inputmode="numeric" maxlength="4" placeholder="Choose a 4-digit PIN" />
    <div class="form-hint">Your PIN protects your squid — only someone who knows it can ink or remove you. Don't reuse a real password!</div>
    <div class="form-btns">
      <button class="btn-join" id="btn-join">Join the Squad 🦑</button>
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
    </div>
  </div>
  <!-- Edit member modal -->
  <div id="edit-modal" style="display:none">
    <div id="edit-modal-box">
      <div class="form-title">✏️ Edit Squid</div>
      <input id="edit-inp-goal" type="text" placeholder="Goal" />
      <div class="goal-type-toggle">
        <button id="edit-btn-type-daily" class="active">📅 Daily</button>
        <button id="edit-btn-type-weekly">🗓️ Weekly</button>
      </div>
      <div id="edit-weekly-target-row" style="display:none">
        <input id="edit-inp-weekly-target" type="number" min="1" max="7" placeholder="Times per week (e.g. 4)" />
      </div>
      <div class="form-btns">
        <button class="btn-join" id="edit-btn-save">Save Changes</button>
        <button class="btn-cancel" id="edit-btn-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <div class="legend" id="legend" style="display:none">
    Streak badges: <span style="color:#34d399">7🦑</span> ·
    <span style="color:#c084fc">14🦑</span> ·
    <span style="color:#ffd700">30🦑</span> · Resets daily at midnight ET
  </div>
</main>

<script>
  // ─────────────────────────────────────────────
  //  JSONBin credentials (must be wrapped in quotes!)
  // ─────────────────────────────────────────────
  const ACCESS_KEY = "$2a$10$MI0ASTi13LBCB2SEOWFhsukI43QldC8frLt6ZmWvQ84B45i4TXpya";
  const BIN_ID  = "6a2b0d03f5f4af5e29e1aa55";
  // ─────────────────────────────────────────────

  const BASE = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
  const HEADERS = {
    "Content-Type": "application/json",
    "X-Access-Key": ACCESS_KEY,
    "X-Bin-Versioning": "false",
  };

  const MILESTONES = [
    { days: 30, label: "30🦑 LEGEND", color: "#ffd700" },
    { days: 14, label: "14🦑 LEGEND", color: "#c084fc" },
    { days: 7,  label: "7🦑 LEGEND",  color: "#34d399" },
  ];

  // Date string (YYYY-MM-DD) pinned to Eastern Time — the whole squad's
  // day flips at the same moment regardless of device timezone or clock
  const today = () => {
    return new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York" }).format(new Date());
  };

  // ISO date of the most recent Monday in ET — used to reset weekly miss counts
  const weekStart = () => {
    const etStr = new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York" }).format(new Date());
    const d = new Date(etStr + "T00:00:00");
    const day = d.getDay(); // 0=Sun … 6=Sat
    d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    return d.toISOString().slice(0, 10);
  };

  let state = null;
  let formOpen = false;   // true while the add form is showing
  let busy = false;       // true during a save or PIN prompt

  // ── PIN helpers ──────────────────────────────
  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
  }
  function getUnlocked() {
    try { return JSON.parse(localStorage.getItem("squidUnlocked") || "[]"); }
    catch { return []; }
  }
  function addUnlocked(id) {
    const u = getUnlocked();
    if (!u.includes(id)) { u.push(id); localStorage.setItem("squidUnlocked", JSON.stringify(u)); }
  }
  // Returns true if the current device is allowed to act for this member
  async function verifyMember(m, action) {
    if (getUnlocked().includes(m.id)) return true;
    busy = true;
    try {
      if (!m.pinHash) {
        // Legacy member created before PINs existed — first interaction claims it
        const pin = prompt(`${m.name} has no PIN yet. Set a 4-digit PIN to claim this squid:`);
        if (pin === null) return false;
        if (!/^\d{4}$/.test(pin)) { showToast("PIN must be exactly 4 digits"); return false; }
        const hash = await sha256(pin);
        const ok = await syncedUpdate(s => {
          const t = s.members.find(x => x.id === m.id);
          if (!t) return false;            // removed in the meantime
          if (t.pinHash) return false;     // claimed by someone else first
          t.pinHash = hash;
        });
        if (!ok) { showToast("Couldn't claim — refresh and try again"); return false; }
        addUnlocked(m.id);
        showToast("PIN set — squid claimed! 🦑");
        return true;
      }
      const pin = prompt(`Enter ${m.name}'s 4-digit PIN to ${action}:`);
      if (pin === null) return false;
      if (await sha256(pin) === m.pinHash) { addUnlocked(m.id); return true; }
      showToast("❌ Wrong PIN, squid imposter!");
      return false;
    } finally {
      busy = false;
    }
  }

  // ── Data sync ────────────────────────────────
  async function fetchState() {
    const r = await fetch(BASE, { headers: HEADERS });
    if (!r.ok) throw new Error("HTTP " + r.status + " from JSONBin — check that your Bin ID is correct and your Access Key has Read + Update permissions.");
    const j = await r.json();
    return j.record;
  }

  async function pushState(s) {
    const r = await fetch(BASE, { method: "PUT", headers: HEADERS, body: JSON.stringify(s) });
    if (!r.ok) throw new Error("Save failed (HTTP " + r.status + ")");
  }

  // Apply daily reset + defaults to a fetched state object
  function normalize(s) {
    if (!s || typeof s !== "object") s = {};
    if (!Array.isArray(s.members)) s.members = [];

    // Daily reset — runs first so a missed Sunday gets counted before the weekly wipe
    if (s.lastReset !== today()) {
      s.members = s.members.map(m => {
        if (m.goalType === "weekly") {
          // Weekly members just reset the daily ink flag; streak/misses settle at weekly reset
          return { ...m, completedToday: false };
        }
        return {
          ...m,
          streak: m.completedToday ? m.streak : 0,
          missedThisWeek: (m.missedThisWeek || 0) + (m.completedToday ? 0 : 1),
          completedToday: false,
        };
      });
      s.lastReset = today();
    }

    // Weekly reset — every Monday ET
    // Only evaluate if a previous week was recorded (not first-time init)
    if (s.weekStart !== weekStart()) {
      if (s.weekStart) {
        s.members = s.members.map(m => {
          if (m.goalType === "weekly") {
            const hit = (m.weeklyCount || 0) >= (m.weeklyTarget || 1);
            return {
              ...m,
              streak: hit ? (m.streak || 0) + 1 : 0,
              missedThisWeek: hit ? 0 : 1,
              weeklyCount: 0,
            };
          }
          return { ...m, missedThisWeek: 0 };
        });
      }
      s.weekStart = weekStart();
    }

    return s;
  }

  function getSquidOfShame(members) {
    // Weekly members only show up in shame if they failed last week (missedThisWeek=1)
    // Daily members show up as soon as they accumulate any misses this week
    const candidates = members.filter(m => (m.missedThisWeek || 0) > 0);
    if (!candidates.length) return null;
    return candidates.reduce((worst, m) => {
      if ((m.missedThisWeek || 0) > (worst.missedThisWeek || 0)) return m;
      if ((m.missedThisWeek || 0) === (worst.missedThisWeek || 0) && m.streak < worst.streak) return m;
      return worst;
    });
  }

  // Re-fetch latest state, apply a change to it, then save.
  // This shrinks the lost-update window from "since page load" to milliseconds.
  // The mutator can return false to abort (no save happens).
  async function syncedUpdate(mutator) {
    busy = true;
    try {
      const fresh = normalize(await fetchState());
      if (mutator(fresh) === false) {
        // Still adopt the fresh data so the UI reflects reality
        state = fresh;
        render();
        return false;
      }
      state = fresh;
      render();
      await pushState(state);
      return true;
    } catch (e) {
      showToast("⚠️ " + (e.message || "Sync failed — refresh and try again"));
      return false;
    } finally {
      busy = false;
    }
  }

  async function load() {
    if (ACCESS_KEY === "YOUR_ACCESS_KEY" || BIN_ID === "YOUR_BIN_ID") {
      const b = document.getElementById("setup-banner");
      b.innerHTML = "⚠️ <strong>Setup needed:</strong> Open <code>index.html</code> and paste your JSONBin Access Key and Bin ID into the script (in quotes).";
      b.style.display = "block";
      document.getElementById("add-btn").style.display = "none";
      return;
    }
    try {
      const fresh = await fetchState();
      const needsReset = fresh.lastReset !== today();
      state = normalize(fresh);
      if (needsReset) await pushState(state);
      render();
    } catch (e) {
      const b = document.getElementById("setup-banner");
      b.innerHTML = "⚠️ <strong>Connection error:</strong> " + esc(String(e.message || e));
      b.style.display = "block";
    }
  }

  function getMilestone(streak) {
    return MILESTONES.find(m => streak >= m.days) || null;
  }

  // ── Rendering ────────────────────────────────
  function render() {
    const members = state.members;
    const done = members.filter(m => m.completedToday).length;
    const total = members.length;

    const bar = document.getElementById("summary-bar");
    if (total > 0) {
      bar.style.display = "inline-block";
      bar.textContent = done === total
        ? `🦑 ALL SQUIDS INKED TODAY! (${done}/${total})`
        : `🦑 ${done} of ${total} squids inked today`;
    } else {
      bar.style.display = "none";
    }

    document.getElementById("empty-msg").style.display = total === 0 ? "block" : "none";
    document.getElementById("legend").style.display = total > 0 ? "block" : "none";

    // Squid of Shame banner
    const shame = getSquidOfShame(members);
    const shameBanner = document.getElementById("shame-banner");
    if (shame) {
      shameBanner.style.display = "block";
      const isWeekly = shame.goalType === "weekly";
      const shameDetail = isWeekly
        ? `Only hit ${shame.weeklyCount || 0}/${shame.weeklyTarget || 1} this week — step it up!`
        : `Missed ${shame.missedThisWeek} day${shame.missedThisWeek === 1 ? "" : "s"} this week — step it up!`;
      shameBanner.innerHTML = `
        <div class="shame-title">🪣 Squid of Shame — This Week</div>
        <div class="shame-name">🦑 ${esc(shame.name)} 🦑</div>
        <div class="shame-detail">${shameDetail}</div>`;
    } else {
      shameBanner.style.display = "none";
    }

    const container = document.getElementById("cards");
    container.innerHTML = "";
    members.forEach(m => {
      const isWeekly = m.goalType === "weekly";
      const ms = getMilestone(m.streak);
      const missed = m.missedThisWeek || 0;
      const isShamed = shame && shame.id === m.id;

      // Weekly progress info
      const wCount = m.weeklyCount || 0;
      const wTarget = m.weeklyTarget || 1;
      const wDone = wCount >= wTarget;
      const wColor = wDone ? "#34d399" : wCount > 0 ? "#38bdf8" : "#64748b";

      // Shame banner detail is different for weekly members
      const streakLabel = isWeekly
        ? (m.streak > 0 ? `🔥 ${m.streak}-week streak` : "No streak yet")
        : (m.streak > 0 ? `🔥 ${m.streak}-day streak` : "No streak yet");
      const streakColor = m.streak > 0 ? "#34d399" : "#64748b";

      const missedRow = isWeekly
        ? `<div class="card-missed" style="color:${wColor}">🗓️ ${wCount}/${wTarget} this week${wDone ? " ✓" : ""}</div>`
        : `<div class="card-missed" style="color:${missed > 0 ? "#f87171" : "#94a3b8"}">${missed > 0 ? `💀 ${missed} miss${missed === 1 ? "" : "es"} this week` : "✨ No misses this week"}</div>`;

      const card = document.createElement("div");
      card.className = `card ${m.completedToday ? "done" : "pending"}`;
      card.innerHTML = `
        <div class="card-icon">${m.completedToday ? "✅" : (isShamed ? "🪣" : (isWeekly ? "🗓️" : "🦑"))}</div>
        <div class="card-info">
          <div class="card-name-row">
            <span class="card-name">${esc(m.name)}</span>
            ${isWeekly ? `<span class="badge" style="background:rgba(56,189,248,0.15);border:1px solid rgba(56,189,248,0.4);color:#38bdf8">Weekly</span>` : ""}
            ${ms ? `<span class="badge" style="background:${ms.color}22;border:1px solid ${ms.color}88;color:${ms.color}">${ms.label}</span>` : ""}
            ${isShamed ? `<span class="badge" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.45);color:#f87171">🪣 Squid of Shame</span>` : ""}
          </div>
          <div class="card-goal">🎯 ${esc(m.goal)}</div>
          <div class="card-streak" style="color:${streakColor}">${streakLabel}</div>
          ${missedRow}
        </div>
        <div class="card-actions">
          ${m.completedToday
            ? `<span class="inked-label">Inked ✓</span><button class="btn-unink" data-id="${m.id}">un-ink</button>`
            : `<button class="btn-ink" data-id="${m.id}">Ink It! 🦑</button>`}
          <button class="btn-edit" data-id="${m.id}">edit</button>
          <button class="btn-remove" data-id="${m.id}">remove</button>
        </div>`;
      container.appendChild(card);
    });

    container.querySelectorAll(".btn-ink").forEach(b =>
      b.addEventListener("click", () => checkin(b.dataset.id)));
    container.querySelectorAll(".btn-unink").forEach(b =>
      b.addEventListener("click", () => uncheckin(b.dataset.id)));
    container.querySelectorAll(".btn-edit").forEach(b =>
      b.addEventListener("click", () => openEditModal(b.dataset.id)));
    container.querySelectorAll(".btn-remove").forEach(b =>
      b.addEventListener("click", () => remove(b.dataset.id)));
  }

  // ── Actions ──────────────────────────────────
  async function checkin(id) {
    const m = state.members.find(x => x.id === id);
    if (!m || m.completedToday) return;
    if (!(await verifyMember(m, "ink it"))) return;
    const ok = await syncedUpdate(s => {
      const t = s.members.find(x => x.id === id);
      if (!t || t.completedToday) return false;
      t.completedToday = true;
      if (t.goalType === "weekly") {
        t.weeklyCount = (t.weeklyCount || 0) + 1;
      } else {
        t.streak += 1;
      }
    });
    if (ok) showToast("Inked! 🦑");
  }

  async function uncheckin(id) {
    const m = state.members.find(x => x.id === id);
    if (!m || !m.completedToday) return;
    if (!(await verifyMember(m, "un-ink it"))) return;
    const ok = await syncedUpdate(s => {
      const t = s.members.find(x => x.id === id);
      if (!t || !t.completedToday) return false;
      t.completedToday = false;
      if (t.goalType === "weekly") {
        t.weeklyCount = Math.max(0, (t.weeklyCount || 0) - 1);
      } else {
        t.streak = Math.max(0, t.streak - 1);
      }
    });
    if (ok) showToast("Un-inked 💧");
  }

  async function remove(id) {
    const m = state.members.find(x => x.id === id);
    if (!m) return;
    if (!(await verifyMember(m, "remove them"))) return;
    if (!confirm(`Remove ${m.name} from the squad? Their streak will be lost.`)) return;
    await syncedUpdate(s => {
      s.members = s.members.filter(x => x.id !== id);
    });
  }

  // ── Add form ─────────────────────────────────
  let selectedGoalType = "daily";

  document.getElementById("btn-type-daily").addEventListener("click", () => {
    selectedGoalType = "daily";
    document.getElementById("btn-type-daily").classList.add("active");
    document.getElementById("btn-type-weekly").classList.remove("active");
    document.getElementById("weekly-target-row").style.display = "none";
  });
  document.getElementById("btn-type-weekly").addEventListener("click", () => {
    selectedGoalType = "weekly";
    document.getElementById("btn-type-weekly").classList.add("active");
    document.getElementById("btn-type-daily").classList.remove("active");
    document.getElementById("weekly-target-row").style.display = "block";
  });

  document.getElementById("add-btn").addEventListener("click", () => {
    formOpen = true;
    document.getElementById("add-form").style.display = "block";
    document.getElementById("add-btn").style.display = "none";
  });
  document.getElementById("btn-cancel").addEventListener("click", () => {
    formOpen = false;
    document.getElementById("add-form").style.display = "none";
    document.getElementById("add-btn").style.display = "block";
    clearForm();
  });
  document.getElementById("btn-join").addEventListener("click", async () => {
    if (!state) { showToast("⚠️ Not connected to database yet."); return; }
    const name = document.getElementById("inp-name").value.trim();
    const goal = document.getElementById("inp-goal").value.trim();
    const pin  = document.getElementById("inp-pin").value.trim();
    if (!name || !goal) return;
    if (!/^\d{4}$/.test(pin)) { showToast("PIN must be exactly 4 digits"); return; }
    if (selectedGoalType === "weekly") {
      const t = parseInt(document.getElementById("inp-weekly-target").value, 10);
      if (!t || t < 1 || t > 7) { showToast("Enter a weekly target between 1 and 7"); return; }
    }
    const id = Date.now().toString();
    const pinHash = await sha256(pin);
    const member = { id, name, goal, goalType: selectedGoalType, streak: 0, completedToday: false, pinHash };
    if (selectedGoalType === "weekly") {
      member.weeklyTarget = parseInt(document.getElementById("inp-weekly-target").value, 10);
      member.weeklyCount = 0;
    }
    const ok = await syncedUpdate(s => { s.members.push(member); });
    if (!ok) return;
    addUnlocked(id);
    formOpen = false;
    document.getElementById("add-form").style.display = "none";
    document.getElementById("add-btn").style.display = "block";
    clearForm();
    showToast("Welcome to the squad! 🦑");
  });

  function clearForm() {
    document.getElementById("inp-name").value = "";
    document.getElementById("inp-goal").value = "";
    document.getElementById("inp-pin").value = "";
    document.getElementById("inp-weekly-target").value = "";
    selectedGoalType = "daily";
    document.getElementById("btn-type-daily").classList.add("active");
    document.getElementById("btn-type-weekly").classList.remove("active");
    document.getElementById("weekly-target-row").style.display = "none";
  }

  // ── Edit modal ───────────────────────────────
  let editingId = null;
  let editGoalType = "daily";

  document.getElementById("edit-btn-type-daily").addEventListener("click", () => {
    editGoalType = "daily";
    document.getElementById("edit-btn-type-daily").classList.add("active");
    document.getElementById("edit-btn-type-weekly").classList.remove("active");
    document.getElementById("edit-weekly-target-row").style.display = "none";
  });
  document.getElementById("edit-btn-type-weekly").addEventListener("click", () => {
    editGoalType = "weekly";
    document.getElementById("edit-btn-type-weekly").classList.add("active");
    document.getElementById("edit-btn-type-daily").classList.remove("active");
    document.getElementById("edit-weekly-target-row").style.display = "block";
  });

  async function openEditModal(id) {
    const m = state.members.find(x => x.id === id);
    if (!m) return;
    if (!(await verifyMember(m, "edit them"))) return;
    editingId = id;
    editGoalType = m.goalType || "daily";
    document.getElementById("edit-inp-goal").value = m.goal;
    document.getElementById("edit-inp-weekly-target").value = m.weeklyTarget || "";
    // Set toggle state
    if (editGoalType === "weekly") {
      document.getElementById("edit-btn-type-weekly").classList.add("active");
      document.getElementById("edit-btn-type-daily").classList.remove("active");
      document.getElementById("edit-weekly-target-row").style.display = "block";
    } else {
      document.getElementById("edit-btn-type-daily").classList.add("active");
      document.getElementById("edit-btn-type-weekly").classList.remove("active");
      document.getElementById("edit-weekly-target-row").style.display = "none";
    }
    document.getElementById("edit-modal").style.display = "flex";
    busy = true;
  }

  document.getElementById("edit-btn-cancel").addEventListener("click", () => {
    document.getElementById("edit-modal").style.display = "none";
    editingId = null;
    busy = false;
  });

  document.getElementById("edit-btn-save").addEventListener("click", async () => {
    const goal = document.getElementById("edit-inp-goal").value.trim();
    if (!goal) { showToast("Goal can't be empty"); return; }
    if (editGoalType === "weekly") {
      const t = parseInt(document.getElementById("edit-inp-weekly-target").value, 10);
      if (!t || t < 1 || t > 7) { showToast("Enter a weekly target between 1 and 7"); return; }
    }
    const id = editingId;
    const newGoalType = editGoalType;
    const newTarget = parseInt(document.getElementById("edit-inp-weekly-target").value, 10) || null;
    document.getElementById("edit-modal").style.display = "none";
    editingId = null;
    busy = false;
    const ok = await syncedUpdate(s => {
      const t = s.members.find(x => x.id === id);
      if (!t) return false;
      t.goal = goal;
      const wasWeekly = t.goalType === "weekly";
      const nowWeekly = newGoalType === "weekly";
      t.goalType = newGoalType;
      if (nowWeekly) {
        t.weeklyTarget = newTarget;
        if (!wasWeekly) { t.weeklyCount = 0; t.streak = 0; }
      } else {
        if (wasWeekly) { t.weeklyCount = 0; t.streak = 0; }
        delete t.weeklyTarget;
      }
    });
    if (ok) showToast("Updated! 🦑");
  });

  // ── Live auto-refresh ────────────────────────
  const POLL_MS = 30000; // re-check every 30s; lower = snappier but more API calls

  async function poll() {
    // Skip if the user is busy typing, entering a PIN, or a save is in flight
    if (formOpen || busy || !state) return;
    try {
      const fresh = normalize(await fetchState());
      // Only re-render if something actually changed (avoids flicker)
      if (JSON.stringify(fresh) !== JSON.stringify(state)) {
        state = fresh;
        render();
      }
    } catch (e) {
      // Stay quiet on transient poll failures — the next tick will retry
    }
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2200);
  }

  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  load();
  setInterval(poll, POLL_MS);

  // Also refresh the moment you return to the tab after it was hidden
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) poll();
  });
</script>
</body>
</html>
